        <!-- 近期任务时间线 -->

            <div class="timeline-title">
                <i class="fas fa-calendar-alt"></i> 近期任务计划
            </div>
            <div id="recentTasksContainer"></div>

        <!-- API状态指示器 -->

            <p>© 2026 项目管理系统 - 增强版 v2.2 | 实时数据 | 增强功能已恢复</p>
            <p>数据同步: <span class="update-time" id="syncTime">2026-03-24 18:05:00</span> | 下次更新: <span id="nextUpdate">2分钟</span></p>
            <p class="mt-2">
                <small>
                    <i class="fas fa-info-circle"></i> 
                    支持实时数据API、增量更新跟踪、项目卡点管理、移动端优化、增强版UI

    <!-- JavaScript -->
    <script src="scripts/enhanced.js"></script>
    <script>
        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', function() {
            // 初始化增强版主页面
            if (window.initEnhancedDashboard) {
                window.initEnhancedDashboard();
            }
            
            // 更新时间显示
            updateTimeDisplay();
            
            // 每30秒更新一次时间
            setInterval(updateTimeDisplay, 30000);
            
            // 绑定全局按钮事件
            initGlobalButtons();
        });
        
        // 更新时间显示
        function updateTimeDisplay() {
            const now = new Date();
            const timeStr = now.toLocaleString('zh-CN', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                hour12: false
            });
            
            // 计算下次更新时间（2分钟后）
            const nextUpdate = new Date(now.getTime() + 2 * 60 * 1000);
            const nextUpdateStr = nextUpdate.toLocaleTimeString('zh-CN', {
                hour: '2-digit',
                minute: '2-digit',
                hour12: false
            });
            
            document.getElementById('updateTime').textContent = timeStr;
            document.getElementById('syncTime').textContent = timeStr;
            document.getElementById('nextUpdate').textContent = nextUpdateStr;
        }
        
        // 初始化全局按钮
        function initGlobalButtons() {
            // 全局刷新按钮
            document.getElementById('globalRefresh').addEventListener('click', () => {
                window.location.reload();
            });
            
            // 全局导出按钮
            document.getElementById('globalExport').addEventListener('click', () => {
                alert('数据导出功能将在下一个版本中实现！');
            });
            
            // 全局主题按钮
            document.getElementById('globalTheme').addEventListener('click', () => {
                alert('主题切换功能正在开发中...');
            });
            
            // 全局设置按钮
            document.getElementById('globalSettings').addEventListener('click', () => {
                alert('设置页面将在下一个版本中实现！');
            });
        }
    </script>
