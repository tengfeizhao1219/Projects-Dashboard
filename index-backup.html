<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>项目管理系统 - 增强版 v2.4</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/enhanced.css">
</head>
<body>
    <div class="container container-wide">
        <!-- 导航栏 -->
        <nav class="navbar">
            <div class="nav-brand">
                <i class="fas fa-rocket"></i>
                <span>项目管理系统</span>
                <span class="version-badge">v2.4</span>
            </div>
            <div class="nav-links">
                <a href="index.html" class="nav-link active">
                    <i class="fas fa-home"></i> 项目总览
                </a>
                <a href="sync-monitor-enhanced.html" class="nav-link">
                    <i class="fas fa-sync-alt"></i> 同步监控
                </a>
                <a href="project-details.html" class="nav-link">
                    <i class="fas fa-info-circle"></i> 项目详情
                </a>
                <a href="https://github.com/tengfeizhao1219/Projects-Dashboard" class="nav-link" target="_blank">
                    <i class="fab fa-github"></i> GitHub
                </a>
            </div>
        </nav>
        
        <!-- 页面标题 -->
        <div class="page-header">
            <h1><i class="fas fa-tachometer-alt"></i> 项目总览 - 增强版</h1>
            <div class="header-actions">
                <button class="btn btn-primary" id="globalRefresh">
                    <i class="fas fa-redo"></i> 刷新
                </button>
                <button class="btn btn-secondary" id="globalExport">
                    <i class="fas fa-download"></i> 导出
                </button>
                <button class="btn btn-secondary" id="globalTheme">
                    <i class="fas fa-palette"></i> 主题
                </button>
                <button class="btn btn-secondary" id="globalSettings">
                    <i class="fas fa-cog"></i> 设置
                </button>
            </div>
        </div>        <!-- 英雄统计区域 -->
        <div id="heroStatsContainer"></div>
        
        <!-- 更新时间 -->
        <div style="text-align: center; margin-bottom: 25px;">
            <div class="update-time">
                <i class="fas fa-clock"></i> 最后更新: <span id="updateTime">2026-03-24 18:05:00</span>
            </div>
        </div>
        
        <!-- 项目网格增强版 -->
        <h2 class="mt-4"><i class="fas fa-project-diagram"></i> 所有项目</h2>
        <div id="projectsContainer"></div>
        
        <!-- 近期任务时间线 -->
        <div class="timeline">
            <div class="timeline-title">
                <i class="fas fa-calendar-alt"></i> 近期任务计划
            </div>
            <div id="recentTasksContainer"></div>
        </div>
        
        <!-- API状态指示器 -->
        <div class="api-status-container" id="apiStatusContainer"></div>
        
        <!-- 页脚 -->
        <footer>
            <p>© 2026 项目管理系统 - 增强版 v2.4 | 实时数据 | 增强功能已恢复</p>
            <p>数据同步: <span class="update-time" id="syncTime">2026-03-24 18:05:00</span> | 下次更新: <span id="nextUpdate">2分钟</span></p>
            <p class="mt-2">
                <small>
                    <i class="fas fa-info-circle"></i> 
                    支持实时数据API、增量更新跟踪、项目卡点管理、移动端优化、增强版UI
                </small>
            </p>
        </footer>
    </div>

    <!-- JavaScript -->
    <script src="scripts/enhanced.js"></script>
    <script>
        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', function() {
            // 初始化增强版主页面
            if (window.initEnhancedDashboard) {
                window.initEnhancedDashboard();
            }
            
            // 更新时间显示
            updateTimeDisplay();
            
            // 每30秒更新一次时间
            setInterval(updateTimeDisplay, 30000);
            
            // 绑定全局按钮事件
            initGlobalButtons();
        });
        
        // 更新时间显示
        function updateTimeDisplay() {
            const now = new Date();
            const timeStr = now.toLocaleString('zh-CN', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                hour12: false
            });
            
            // 计算下次更新时间（2分钟后）
            const nextUpdate = new Date(now.getTime() + 2 * 60 * 1000);
            const nextUpdateStr = nextUpdate.toLocaleTimeString('zh-CN', {
                hour: '2-digit',
                minute: '2-digit',
                hour12: false
            });
            
            document.getElementById('updateTime').textContent = timeStr;
            document.getElementById('syncTime').textContent = timeStr;
            document.getElementById('nextUpdate').textContent = nextUpdateStr;
        }
        
        // 初始化全局按钮
        function initGlobalButtons() {
            // 全局刷新按钮
            document.getElementById('globalRefresh').addEventListener('click', () => {
                window.location.reload();
            });
            
            // 全局导出按钮
            document.getElementById('globalExport').addEventListener('click', () => {
                alert('数据导出功能将在下一个版本中实现！');
            });
            
            // 全局主题按钮
            document.getElementById('globalTheme').addEventListener('click', () => {
                alert('主题切换功能正在开发中...');
            });
            
            // 全局设置按钮
            document.getElementById('globalSettings').addEventListener('click', () => {
                alert('设置页面将在下一个版本中实现！');
            });
        }
    </script>
</body>
</html>
