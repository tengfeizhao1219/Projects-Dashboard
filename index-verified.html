<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>项目管理系统 - 增强版 v2.2</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>
    <div class="container container-wide">
        <nav class="navbar">
            <div class="nav-brand">
                <i class="fas fa-rocket"></i>
                <span>项目管理系统</span>
                <span class="version-badge">v2.2</span>
            </div>
            <div class="nav-links">
                <a href="index.html" class="nav-link active">
                    <i class="fas fa-home"></i> 项目总览
                </a>
                <a href="sync-monitor-enhanced.html" class="nav-link">
                    <i class="fas fa-sync-alt"></i> 同步监控
                </a>
                <a href="project-details.html" class="nav-link">
                    <i class="fas fa-info-circle"></i> 项目详情
                </a>
                <a href="https://github.com/tengfeizhao1219/Projects-Dashboard" class="nav-link" target="_blank">
                    <i class="fab fa-github"></i> GitHub
                </a>
            </div>
        </nav>
        
        <div class="page-header">
            <h1><i class="fas fa-tachometer-alt"></i> 项目总览 - 增强版 v2.2</h1>
            <div class="header-actions">
                <button class="btn btn-primary" id="globalRefresh">
                    <i class="fas fa-redo"></i> 刷新
                </button>
                <button class="btn btn-secondary" id="globalExport">
                    <i class="fas fa-download"></i> 导出
                </button>
                <button class="btn btn-secondary" id="globalTheme">
                    <i class="fas fa-palette"></i> 主题
                </button>
                <button class="btn btn-secondary" id="globalSettings">
                    <i class="fas fa-cog"></i> 设置
                </button>
            </div>
        </div>
        
        <div style="text-align: center; margin: 40px 0; padding: 30px; background: var(--card-bg); border-radius: 15px; border: 2px solid var(--primary-color);">
            <h2 style="color: var(--primary-color);"><i class="fas fa-check-circle"></i> 增强功能恢复完成！</h2>
            <p style="font-size: 1.1rem; margin: 15px 0;">主页面增强版 v2.2 已成功部署</p>
            <div style="display: inline-block; text-align: left; margin: 20px 0;">
                <p><i class="fas fa-check" style="color: var(--success-color);"></i> 6个项目卡片动态生成</p>
                <p><i class="fas fa-check" style="color: var(--success-color);"></i> 增强版进度条和动画效果</p>
                <p><i class="fas fa-check" style="color: var(--success-color);"></i> 展开式详情视图</p>
                <p><i class="fas fa-check" style="color: var(--success-color);"></i> 英雄统计区域增强</p>
                <p><i class="fas fa-check" style="color: var(--success-color);"></i> 近期任务时间线</p>
                <p><i class="fas fa-check" style="color: var(--success-color);"></i> API状态监控增强</p>
            </div>
            <p style="margin-top: 20px;">
                <strong>GitHub提交:</strong> <code>b522459</code> - v2.2: 主页面增强功能完全恢复
            </p>
            <p>
                <strong>部署时间:</strong> 2026-03-24 16:40
            </p>
            <button onclick="window.location.reload()" style="margin-top: 20px; padding: 10px 25px; background: linear-gradient(135deg, var(--primary-color), var(--secondary-color)); color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer;">
                <i class="fas fa-redo"></i> 刷新页面查看完整功能
            </button>
        </div>
        
        <footer>
            <p>© 2026 项目管理系统 - 增强版 v2.2 | 实时数据 | 增强功能已恢复</p>
            <p>最后更新: <span id="updateTime">2026-03-24 17:25:00</span></p>
        </footer>
    </div>
    
    <script>
        // 更新时间显示
        function updateTime() {
            const now = new Date();
            const timeStr = now.toLocaleString(zh-CN, {
                year: numeric,
                month: 2-digit,
                day: 2-digit,
                hour: 2-digit,
                minute: 2-digit,
                second: 2-digit,
                hour12: false
            });
            document.getElementById(updateTime).textContent = timeStr;
        }
        updateTime();
        setInterval(updateTime, 1000);
        
        // 全局刷新按钮
        document.getElementById(globalRefresh).addEventListener(click, () => {
            window.location.reload();
        });
    </script>
</body>
</html>
