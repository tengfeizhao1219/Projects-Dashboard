                </a>
            </div>
        </nav>
        
        <!-- 页面标题 -->
        <div class="page-header">
            <h1><i class="fas fa-tachometer-alt"></i> 项目总览</h1>
            <div class="header-actions">
                <button class="btn btn-primary" id="globalRefresh">
                    <i class="fas fa-redo"></i> 刷新
                </button>
                <button class="btn btn-secondary" id="globalExport">
                    <i class="fas fa-download"></i> 导出
                </button>
                <button class="btn btn-secondary" id="globalTheme">
                    <i class="fas fa-palette"></i> 主题
                </button>
                <button class="btn btn-secondary" id="globalSettings">
                    <i class="fas fa-cog"></i> 设置
                </button>
            </div>
        </div>
        
        <!-- 英雄统计区域 -->
        <div class="hero-stats-enhanced">
            <div class="stat-card-enhanced card">
                <div class="stat-icon-enhanced">
                    <i class="fas fa-project-diagram"></i>
                </div>
                <div class="stat-value-enhanced" id="activeProjects">6</div>
                <div class="stat-label-enhanced">活跃项目</div>
                <div class="stat-trend-enhanced">
                    <i class="fas fa-arrow-up trend-up-enhanced"></i>
                    <span>较上月 +2</span>
                </div>
            </div>
            
            <div class="stat-card-enhanced card">
                <div class="stat-icon-enhanced">
                    <i class="fas fa-chart-line"></i>
                </div>
                <div class="stat-value-enhanced" id="avgProgress">68%</div>
                <div class="stat-label-enhanced">平均进度</div>
                <div class="stat-trend-enhanced">
                    <i class="fas fa-arrow-up trend-up-enhanced"></i>
                    <span>较上周 +5%</span>
                </div>
            </div>
            
            <div class="stat-card-enhanced card">
                <div class="stat-icon-enhanced">
                    <i class="fas fa-tasks"></i>
                </div>
                <div class="stat-value-enhanced" id="pendingTasks">14</div>
                <div class="stat-label-enhanced">待完成任务</div>
                <div class="stat-trend-enhanced">
                    <i class="fas fa-arrow-down trend-down-enhanced"></i>
                    <span>较上周 -3</span>
                </div>
            </div>
            
            <div class="stat-card-enhanced card">
                <div class="stat-icon-enhanced">
                    <i class="fas fa-exclamation-triangle"></i>
                </div>
                <div class="stat-value-enhanced" id="activeBlockers">3</div>
                <div class="stat-label-enhanced">当前卡点</div>
                <div class="stat-trend-enhanced">
                    <i class="fas fa-minus"></i>
                    <span>与上周持平</span>
                </div>
            </div>
        </div>
        
        <!-- 更新时间 -->
        <div style="text-align: center; margin-bottom: 25px;">
            <div class="update-time">
                <i class="fas fa-clock"></i> 最后更新: <span id="updateTime">2026-03-24 14:39:00</span>
            </div>
        </div>
        
        <!-- 项目网格增强版 -->
        <h2 class="mt-4"><i class="fas fa-project-diagram"></i> 所有项目 <small style="color: var(--text-secondary); font-weight: normal;">(点击展开查看详情)</small></h2>
        <div class="projects-grid" id="projectsContainer">
            <!-- 项目卡片将通过JavaScript动态生成 -->
        </div>
        
        <!-- 近期任务时间线 -->
        <div class="timeline">
            <div class="timeline-title">
                <i class="fas fa-calendar-alt"></i> 近期任务计划
            </div>
            <div class="timeline-container" id="recentTasksContainer">
                <!-- 近期任务将通过JavaScript动态生成 -->
            </div>
        </div>
        
        <!-- API状态指示器 -->
        <div class="api-status-container">
            <div class="api-status-card">
                <div class="api-status-indicator-main">
                    <div class="api-status-dot-main" id="apiStatusDotMain"></div>
                    <div class="api-status-text-main">
                        实时数据API: <strong id="apiStatusTextMain">连接中...</strong>
                    </div>
                </div>
                <button class="api-test-btn" id="apiTestBtnMain">
                    <i class="fas fa-bolt"></i> 测试连接
                </button>
            </div>
            <div class="data-source-info">
                <i class="fas fa-database"></i> 数据源: 可靠的每小时同步系统API | 最后同步: <span id="lastSyncTime">加载中...</span>
            </div>
        </div>
        
        <!-- 页脚 -->
        <footer>
            <p>© 2026 项目管理系统 - 增强版 | 实时数据 | 版本 2.1.0</p>
            <p>数据同步: <span class="update-time" id="syncTime">加载中...</span> | 下次更新: <span id="nextUpdate">2分钟</span></p>
            <p class="mt-2">
                <small>
                    <i class="fas fa-info-circle"></i> 
                    支持实时数据API、增量更新跟踪、项目卡点管理、移动端优化
                </small>
            </p>
        </footer>
    </div>

    <!-- JavaScript -->
    <script src="scripts/api-integration.js"></script>
    <script src="scripts/main-enhanced.js"></script>
    <script>
        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', function() {
            // 初始化API集成
            if (window.APIIntegration && window.APIIntegration.initAPIIntegration) {
                window.APIIntegration.initAPIIntegration();
            }
            
            // 初始化主页面
            if (window.initEnhancedDashboard) {
                window.initEnhancedDashboard();
            }
            
            // 初始化API状态指示器
            initAPIStatusIndicator();
            
            // 更新时间显示
            updateTimeDisplay();
            
            // 每30秒更新一次时间
            setInterval(updateTimeDisplay, 30000);
            
            // 每2分钟检查API状态
            setInterval(checkAPIStatus, 120000);
            
            // 每5分钟更新同步时间
            setInterval(updateSyncTime, 300000);
        });
        
        // 初始化API状态指示器
        function initAPIStatusIndicator() {
            const apiStatusDot = document.getElementById('apiStatusDotMain');
            const apiStatusText = document.getElementById('apiStatusTextMain');
            const apiTestBtn = document.getElementById('apiTestBtnMain');
            
            if (!apiStatusDot || !apiStatusText || !apiTestBtn) return;
            
            // 绑定测试按钮事件
            apiTestBtn.addEventListener('click', testAPIConnection);
            
            // 初始状态检查
            setTimeout(checkAPIStatus, 1000);
        }
        
        // 检查API状态
        async function checkAPIStatus() {
            const apiStatusDot = document.getElementById('apiStatusDotMain');
            const apiStatusText = document.getElementById('apiStatusTextMain');
            
            if (!apiStatusDot || !apiStatusText) return;
            
            try {
                if (window.APIIntegration && window.APIIntegration.checkHealth) {
                    const isHealthy = await window.APIIntegration.checkHealth();
                    
                    if (isHealthy) {
                        apiStatusDot.className = 'api-status-dot-main';
                        apiStatusText.textContent = '已连接';
                        apiStatusText.style.color = 'var(--success-color)';
                    } else {
                        apiStatusDot.className = 'api-status-dot-main offline';
                        apiStatusText.textContent = '连接失败';
                        apiStatusText.style.color = 'var(--warning-color)';
                    }
                } else {
                    apiStatusDot.className = 'api-status-dot-main offline';
                    apiStatusText.textContent = '模块未加载';
                    apiStatusText.style.color = 'var(--warning-color)';
                }
            } catch (error) {
                apiStatusDot.className = 'api-status-dot-main offline';
                apiStatusText.textContent = '检查失败';
                apiStatusText.style.color = 'var(--warning-color)';
            }
        }
        
        // 测试API连接
        async function testAPIConnection() {
            const btn = document.getElementById('apiTestBtnMain');
            if (!btn) return;
            
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 测试中...';
            btn.disabled = true;
            
            try {
                if (window.APIIntegration && window.APIIntegration.testAPIConnection) {
                    await window.APIIntegration.testAPIConnection();
                } else {
                    showNotification('API集成模块未加载', 'warning');
                }
            } catch (error) {
                showNotification(`API连接测试失败: ${error.message}`, 'error');
            } finally {
                setTimeout(() => {
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                }, 1000);
            }
        }
        
        // 更新时间显示
        function updateTimeDisplay() {
            const now = new Date();
            const timeStr = now.toLocaleString('zh-CN', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                hour12: false
            });
            
            // 计算下次更新时间（2分钟后）
            const nextUpdate = new Date(now.getTime() + 2 * 60 * 1000);
            const nextUpdateStr = nextUpdate.toLocaleTimeString('zh-CN', {
                hour: '2-digit',
                minute: '2-digit',
                hour12: false
            });
            
            document.getElementById('updateTime').textContent = timeStr;
            document.getElementById('syncTime').textContent = timeStr;
            document.getElementById('nextUpdate').textContent = nextUpdateStr;
        }
        
        // 更新同步时间
        function updateSyncTime() {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('zh-CN', {
                hour: '2-digit',
                minute: '2-digit',
                hour12: false
            });
            document.getElementById('lastSyncTime').textContent = timeStr;
        }
        
        // 显示通知
        function showNotification(message, type = 'info') {
            // 移除现有的通知
            const existingNotification = document.querySelector('.notification');
            if (existingNotification) {
                existingNotification.remove();
            }
            
            // 创建通知元素
            const notification = document.createElement('div');
            notification.className = `notification notification-${type}`;
            notification.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                padding: 15px 25px;
                border-radius: 8px;
                color: white;
                font-weight: 500;
                z-index: 1000;
                box-shadow: 0 5px 15px rgba(0,0,0,0.2);
                animation: slideIn 0.3s ease;
                display: flex;
                align-items: center;
                gap: 10px;
            `;
            
            // 设置背景颜色
            if (type === 'success') {
                notification.style.background = 'linear-gradient(135deg, var(--success-color), #34d399)';
            } else if (type === 'warning') {
                notification.style.background = 'linear-gradient(135deg, var(--warning-color), #fbbf24)';
            } else if (type === 'error') {
                notification.style.background = 'linear-gradient(135deg, var(--danger-color), #dc2626)';
            } else {
                notification.style.background = 'linear-gradient(135deg, var(--primary-color), var(--secondary-color))';
            }
            
            // 设置图标
            let icon = 'info-circle';
            if (type === 'success') icon = 'check-circle';
            if (type === 'warning') icon = 'exclamation-triangle';
            if (type === 'error') icon = 'times-circle';
            
            notification.innerHTML = `
                <i class="fas fa-${icon}"></i>
                <span>${message}</span>
            `;
            
            document.body.appendChild(notification);
            
            // 3秒后自动移除
            setTimeout(() => {
                notification.style.animation = 'slideOut 0.3s ease';
                setTimeout(() => notification.remove(), 300);
            }, 3000);
        }
        
        // 全局操作
        document.getElementById('globalRefresh').addEventListener('click', () => {
            showNotification('正在刷新所有项目数据...', 'info');
            setTimeout(() => {
                window.location.reload();
            }, 1000);
        });
        
        document.getElementById('globalExport').addEventListener('click', () => {
            showNotification('正在准备数据导出...', 'info');
            setTimeout(() => {
                showNotification('数据导出功能将在下一个版本中实现！', 'info');
            }, 500);
        });
        
        document.getElementById('globalTheme').addEventListener('click', () => {
            showNotification('主题切换功能正在开发中...', 'info');
        });
        
        document.getElementById('globalSettings').addEventListener('click', () => {
            showNotification('设置页面将在下一个版本中实现！', 'info');
        });
        
        // 添加CSS动画
        const style = document.createElement('style');
        style.textContent = `
            @keyframes slideIn {
                from {
                    transform: translateX(100%);
                    opacity: 0;
                }
                to {
                    transform: translateX(0);
                    opacity: 1;
                }
            }
            
            @keyframes slideOut {
                from {
                    transform: translateX(0);
                    opacity: 1;
                }
                to {
                    transform: translateX(100%);
                    opacity: 0;
                }
            }
            
            @keyframes pulse {
                0% { opacity: 1; }
                50% { opacity: 0.5; }
                100% { opacity: 1; }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
