        <!-- 项目网格增强版 -->
        <h2 class="mt-4"><i class="fas fa-project-diagram"></i> 所有项目 <small style="color: var(--text-secondary); font-weight: normal;">(点击展开查看详情)</small></h2>
        <div class="projects-grid" id="projectsContainer">
            <!-- 项目卡片将通过JavaScript动态生成 -->
        </div>
        
        <!-- 近期任务时间线 -->
        <div class="timeline">
            <div class="timeline-title">
                <i class="fas fa-calendar-alt"></i> 近期任务计划
            </div>
            <div class="timeline-container" id="recentTasksContainer">
                <!-- 近期任务将通过JavaScript动态生成 -->
            </div>
        </div>
        
        <!-- API状态指示器 -->
        <div style="margin-top: 30px; text-align: center;">
            <div style="display: inline-flex; align-items: center; gap: 10px; padding: 10px 20px; background: var(--card-bg); border-radius: 20px; border: 1px solid var(--border-color);">
                <div id="apiStatus" style="display: flex; align-items: center; gap: 8px;">
                    <div style="width: 10px; height: 10px; border-radius: 50%; background: var(--success-color); animation: pulse 2s infinite;"></div>
                    <span style="color: var(--text-secondary); font-size: 0.9rem;">实时数据API: <span style="color: var(--success-color); font-weight: 600;">已连接</span></span>
                </div>
                <button id="apiTestBtn" style="background: none; border: none; color: var(--text-secondary); cursor: pointer; font-size: 0.8rem; padding: 5px 10px; border-radius: 4px; transition: all 0.3s ease;" onmouseover="this.style.color='var(--primary-color)'; this.style.background='rgba(124,58,237,0.1)'" onmouseout="this.style.color='var(--text-secondary)'; this.style.background='none'">
                    <i class="fas fa-bolt"></i> 测试连接
                </button>
            </div>
        </div>
        
        <!-- 页脚 -->
        <footer>
            <p>© 2026 项目管理系统 - 增强版 | 自动更新 | 版本 2.1.0</p>
            <p>数据同步: <span class="update-time" id="syncTime">加载中...</span> | 下次更新: <span id="nextUpdate">2分钟</span></p>
            <p class="mt-2">
                <small>
                    <i class="fas fa-info-circle"></i> 
                    支持实时数据API、增量更新跟踪、项目卡点管理、移动端优化
                </small>
            </p>
        </footer>
    </div>

    <!-- JavaScript -->
    <script src="scripts/main-enhanced.js"></script>
    <script>
        // 页面特定功能
        function testAPIConnection() {
            const btn = document.getElementById('apiTestBtn');
            const originalText = btn.innerHTML;
            
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 测试中...';
            btn.style.color = 'var(--warning-color)';
            
            // 模拟API测试
            setTimeout(() => {
                const success = Math.random() > 0.1; // 90%成功率
                
                if (success) {
                    showNotification('API连接测试成功！实时数据同步正常。', 'success');
                    btn.innerHTML = '<i class="fas fa-check"></i> 测试成功';
                    btn.style.color = 'var(--success-color)';
                } else {
                    showNotification('API连接测试失败，使用模拟数据继续运行。', 'warning');
                    btn.innerHTML = '<i class="fas fa-times"></i> 测试失败';
                    btn.style.color = 'var(--danger-color)';
                }
                
                // 3秒后恢复
                setTimeout(() => {
                    btn.innerHTML = originalText;
                    btn.style.color = 'var(--text-secondary)';
                }, 3000);
            }, 1500);
        }
        
        // 全局操作
        document.getElementById('globalRefresh').addEventListener('click', () => {
            showNotification('正在刷新所有项目数据...', 'info');
            setTimeout(() => {
                window.location.reload();
            }, 1000);
        });
        
        document.getElementById('globalExport').addEventListener('click', () => {
            showNotification('正在准备数据导出...', 'info');
            setTimeout(() => {
                // 在实际实现中，这里应该调用导出功能
                showNotification('数据导出功能将在下一个版本中实现！', 'info');
            }, 500);
        });
        
        document.getElementById('globalTheme').addEventListener('click', () => {
            showNotification('主题切换功能正在开发中...', 'info');
        });
        
        document.getElementById('globalSettings').addEventListener('click', () => {
            showNotification('设置页面将在下一个版本中实现！', 'info');
        });
        
        document.getElementById('apiTestBtn').addEventListener('click', testAPIConnection);
        
        // 显示通知
        function showNotification(message, type = 'info') {
            // 创建通知元素
            const notification = document.createElement('div');
            notification.className = `notification notification-${type}`;
            notification.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                padding: 15px 25px;
                border-radius: 8px;
                color: white;
                font-weight: 500;
                z-index: 1000;
                box-shadow: 0 5px 15px rgba(0,0,0,0.2);
                animation: slideIn 0.3s ease;
                display: flex;
                align-items: center;
                gap: 10px;
            `;
            
            // 设置背景颜色
            if (type === 'success') {
                notification.style.background = 'linear-gradient(135deg, var(--success-color), #34d399)';
            } else if (type === 'warning') {
                notification.style.background = 'linear-gradient(135deg, var(--warning-color), #fbbf24)';
            } else if (type === 'error') {
                notification.style.background = 'linear-gradient(135deg, var(--danger-color), #dc2626)';
            } else {
                notification.style.background = 'linear-gradient(135deg, var(--primary-color), var(--secondary-color))';
            }
            
            // 设置图标
            let icon = 'info-circle';
            if (type === 'success') icon = 'check-circle';
            if (type === 'warning') icon = 'exclamation-triangle';
            if (type === 'error') icon = 'times-circle';
            
            notification.innerHTML = `
                <i class="fas fa-${icon}"></i>
                <span>${message}</span>
            `;
            
            document.body.appendChild(notification);
            
            // 3秒后自动移除
            setTimeout(() => {
                notification.style.animation = 'slideOut 0.3s ease';
                setTimeout(() => notification.remove(), 300);
            }, 3000);
        }
        
        // 添加CSS动画
        const style = document.createElement('style');
        style.textContent = `
            @keyframes slideIn {
                from {
                    transform: translateX(100%);
                    opacity: 0;
                }
                to {
                    transform: translateX(0);
                    opacity: 1;
                }
            }
            
            @keyframes slideOut {
                from {
                    transform: translateX(0);
                    opacity: 1;
                }
                to {
                    transform: translateX(100%);
                    opacity: 0;
                }
            }
            
            @keyframes pulse {
                0% { opacity: 1; }
                50% { opacity: 0.5; }
                100% { opacity: 1; }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
