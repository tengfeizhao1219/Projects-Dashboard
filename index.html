<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>项目管理系统 - 可视化仪表板</title>
    <!-- 外部样式和图标 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles/main.css">
    <!-- Chart.js 用于未来扩展 -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* 页面特定样式 */
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        
        .hero-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
            background: var(--card-bg);
            padding: 20px;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-color);
        }
        
        .hero-stat {
            text-align: center;
        }
        
        .hero-stat-value {
            font-size: 2rem;
            font-weight: bold;
            color: var(--primary-color);
            margin-bottom: 5px;
        }
        
        .hero-stat-label {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
        
        .quick-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <header>
            <h1><i class="fas fa-rocket"></i> 项目管理系统</h1>
            <p class="subtitle">实时监控所有项目状态与进展 | 最后更新: <span class="update-time" id="updateTime">加载中...</span></p>
        </header>
        
        <!-- 导航栏 -->
        <div class="nav-bar">
            <a href="index.html" class="nav-link active">
                <i class="fas fa-home"></i>
                项目总览
            </a>
            <a href="sync-monitor.html" class="nav-link">
                <i class="fas fa-sync-alt"></i>
                同步系统监控
            </a>
            <a href="https://github.com/tengfeizhao1219/Projects-Dashboard" class="nav-link" target="_blank">
                <i class="fab fa-github"></i>
                GitHub仓库
            </a>
            <a href="https://tengfeizhao1219.github.io/Projects-Dashboard/" class="nav-link" target="_blank">
                <i class="fas fa-external-link-alt"></i>
                在线演示
            </a>
        </div>
        
        <!-- 英雄统计区域 -->
        <div class="hero-stats">
            <div class="hero-stat">
                <div class="hero-stat-value" id="totalProjects">6</div>
                <div class="hero-stat-label">总项目数</div>
            </div>
            <div class="hero-stat">
                <div class="hero-stat-value" id="completedProjects">2</div>
                <div class="hero-stat-label">已完成</div>
            </div>
            <div class="hero-stat">
                <div class="hero-stat-value" id="inProgressProjects">3</div>
                <div class="hero-stat-label">进行中</div>
            </div>
            <div class="hero-stat">
                <div class="hero-stat-value" id="blockedProjects">1</div>
                <div class="hero-stat-label">受阻中</div>
            </div>
        </div>
        
        <!-- 快速操作 -->
        <div class="quick-actions">
            <button class="btn btn-primary" onclick="simulateDataUpdate()">
                <i class="fas fa-sync"></i> 模拟数据更新
            </button>
            <button class="btn btn-secondary" onclick="exportData()">
                <i class="fas fa-download"></i> 导出数据
            </button>
            <button class="btn btn-secondary" onclick="toggleTheme()">
                <i class="fas fa-moon"></i> 切换主题
            </button>
        </div>
        
        <!-- 项目网格 -->
        <h2 class="mt-4"><i class="fas fa-project-diagram"></i> 所有项目</h2>
        <div class="projects-grid" id="projectsContainer">
            <!-- 项目卡片将通过JavaScript动态生成 -->
        </div>
        
        <!-- 时间线 -->
        <div class="timeline">
            <div class="timeline-title">
                <i class="fas fa-history"></i> 最近活动时间线
            </div>
            <div class="timeline-container" id="timelineContainer">
                <!-- 时间线内容将通过JavaScript动态生成 -->
            </div>
        </div>
        
        <!-- 页脚 -->
        <footer>
            <p>© 2026 项目管理系统 | 自动更新 | 版本 2.0.0</p>
            <p>数据最后同步: <span class="update-time" id="syncTime">加载中...</span></p>
            <p class="mt-2">
                <small>
                    <i class="fas fa-info-circle"></i> 
                    系统每30秒更新时间，每5分钟模拟数据更新
                </small>
            </p>
        </footer>
    </div>

    <!-- JavaScript -->
    <script src="scripts/main.js"></script>
    <script>
        // 页面特定功能
        function exportData() {
            const data = {
                projects: projects,
                timeline: timelineEvents,
                exportTime: new Date().toISOString(),
                stats: {
                    total: projects.length,
                    completed: projects.filter(p => p.progress >= 100).length,
                    inProgress: projects.filter(p => p.progress > 0 && p.progress < 100).length,
                    blocked: projects.filter(p => p.status === 'blocked').length
                }
            };
            
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `projects-dashboard-export-${new Date().toISOString().slice(0, 10)}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            
            alert('数据已导出为JSON文件！');
        }
        
        function toggleTheme() {
            alert('主题切换功能将在未来版本中实现！');
        }
    </script>
</body>
</html>
